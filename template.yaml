AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: Gmail Email Labeling Agent — Lambda + EventBridge (multi-user)

Parameters:
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key (written to Secrets Manager)

  MaxThreads:
    Type: Number
    Default: 50
    Description: Default max unread threads per run (overridable per schedule via event payload)

  AlertEmail:
    Type: String
    Default: ""
    Description: Email address for Lambda error alerts. Leave empty to disable.

Conditions:
  AlertsEnabled: !Not [!Equals [!Ref AlertEmail, ""]]

Resources:

  # ── Secrets ────────────────────────────────────────────────────────────────

  AnthropicSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: gmail-agent/anthropic-api-key
      SecretString: !Ref AnthropicApiKey

  # Per-user secrets are created by:  python agent.py --user <id> --upload-token
  # Layout: gmail-agent/{user_id}/token
  #         gmail-agent/{user_id}/credentials

  # ── IAM ────────────────────────────────────────────────────────────────────

  AgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Read the shared Anthropic API key
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:gmail-agent/anthropic-api-key*"
              # Read/write per-user secrets only — gmail-agent/<user-id>/token|credentials
              # The path has exactly 3 segments; the wildcard never matches the flat anthropic key
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:CreateSecret
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:gmail-agent/*/*"

  # ── IAM role for EventBridge Scheduler ──────────────────────────────────

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt GmailAgentFunction.Arn

  # ── Lambda ─────────────────────────────────────────────────────────────────
  # One shared function — user_id comes from each schedule's input payload.

  GmailAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Role: !GetAtt AgentRole.Arn
      Timeout: 900
      MemorySize: 512
      Environment:
        Variables:
          LAMBDA_MODE: "1"
          MAX_THREADS: !Ref MaxThreads
    Metadata:
      DockerTag: latest
      DockerContext: .
      Dockerfile: Dockerfile

  # ── Alerting ───────────────────────────────────────────────────────────────

  AlertTopic:
    Type: AWS::SNS::Topic
    Condition: AlertsEnabled
    Properties:
      TopicName: gmail-agent-alerts
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: AlertsEnabled
    Properties:
      AlarmName: gmail-agent-lambda-errors
      AlarmDescription: Lambda function returned an error
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref GmailAgentFunction
      Statistic: Sum
      Period: 300          # 5-minute window
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

Outputs:
  FunctionArn:
    Value: !GetAtt GmailAgentFunction.Arn
    Description: Pass this ARN to add-user.sh when onboarding a new user
  SchedulerRoleArn:
    Value: !GetAtt SchedulerRole.Arn
    Description: Pass this ARN to add-user.sh when onboarding a new user
  LogGroup:
    Value: !Sub "/aws/lambda/${GmailAgentFunction}"
