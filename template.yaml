AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: Gmail Email Labeling Agent — Lambda + EventBridge (multi-user)

Parameters:
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key (written to Secrets Manager)

  MaxThreads:
    Type: Number
    Default: 50
    Description: Default max unread threads per run (overridable per schedule via event payload)

# ── Secrets ────────────────────────────────────────────────────────────────

Resources:

  AnthropicSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: gmail-agent/anthropic-api-key
      SecretString: !Ref AnthropicApiKey

  # Per-user secrets are created by:  python agent.py --user <id> --upload-token
  # Layout: gmail-agent/{user_id}/token
  #         gmail-agent/{user_id}/credentials

  # ── IAM ────────────────────────────────────────────────────────────────────

  AgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:CreateSecret
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:gmail-agent/*"

  # ── IAM role for EventBridge Scheduler ──────────────────────────────────

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt GmailAgentFunction.Arn

  # ── Lambda ─────────────────────────────────────────────────────────────────
  # One shared function — user_id comes from each schedule's input payload.

  GmailAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Role: !GetAtt AgentRole.Arn
      Timeout: 900
      MemorySize: 512
      Environment:
        Variables:
          LAMBDA_MODE: "1"
          MAX_THREADS: !Ref MaxThreads
    Metadata:
      DockerTag: latest
      DockerContext: .
      Dockerfile: Dockerfile

Outputs:
  FunctionArn:
    Value: !GetAtt GmailAgentFunction.Arn
    Description: Pass this ARN to add-user.sh when onboarding a new user
  SchedulerRoleArn:
    Value: !GetAtt SchedulerRole.Arn
    Description: Pass this ARN to add-user.sh when onboarding a new user
  LogGroup:
    Value: !Sub "/aws/lambda/${GmailAgentFunction}"
